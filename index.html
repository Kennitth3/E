<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Hidden Window Tracker</title>
<style>
body { font-family: monospace; background:#111; color:#0f0; }
#log { white-space: pre-wrap; max-height: 75vh; overflow:auto; border:1px solid #0f0; padding:10px; }
button { margin:5px; }
</style>
</head>
<body>

<h2>Hidden / Alive Window Tracker</h2>
<button onclick="clearLog()">Clear</button>
<button onclick="openTrackedWindow()">Open Tracked Window</button>

<div id="log"></div>

<script>
const logEl = document.getElementById('log');

function log(msg) {
  const t = performance.now().toFixed(2);
  logEl.textContent += `[${t} ms] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() { logEl.textContent = ""; }

let lastHeartbeat = 0;
let heartbeatInterval = null;
let hiddenSince = null;
let alive = false;

function openTrackedWindow() {
  log("\n=== OPEN TRACKED WINDOW ===");

  const w = window.open('about:blank', '_blank');
  if (!w) {
    log("Popup blocked");
    return;
  }

  alive = true;
  lastHeartbeat = performance.now();
  hiddenSince = null;

  w.document.write(`
    <title>Tracked</title>
    <script>
      function send(type, extra="") {
        opener.postMessage({
          type,
          t: performance.now(),
          extra
        }, "*");
      }

      // lifecycle events
      window.addEventListener('focus', ()=>send('focus'));
      window.addEventListener('blur', ()=>send('blur'));
      document.addEventListener('visibilitychange', ()=>send('visibility', document.visibilityState));

      // HEARTBEAT (proves it's still alive even if hidden)
      setInterval(() => {
        send('heartbeat');
      }, 50);
    <\/script>
  `);

  // Monitor for death (no heartbeat)
  if (heartbeatInterval) clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(() => {
    const now = performance.now();

    if (alive && now - lastHeartbeat > 200) {
      alive = false;
      log("💀 WINDOW DESTROYED (heartbeat stopped)");

      if (hiddenSince) {
        const duration = (now - hiddenSince).toFixed(2);
        log(`👻 Hidden lifetime before death: ${duration} ms`);
      }
    }
  }, 50);
}

// RECEIVE EVENTS
window.addEventListener('message', (e) => {
  const {type, t, extra} = e.data;

  if (type === 'heartbeat') {
    lastHeartbeat = performance.now();

    if (!alive) {
      alive = true;
      log("⚠️ Heartbeat resumed (unexpected)");
    }
  }

  if (type === 'visibility') {
    log(`[child ${t.toFixed(2)}] VISIBILITY: ${extra}`);

    if (extra === 'hidden') {
      hiddenSince = performance.now();
      log("👻 ENTERED HIDDEN STATE (still alive)");
    }

    if (extra === 'visible') {
      hiddenSince = null;
      log("👁️ RETURNED TO VISIBLE");
    }
  }

  if (type === 'focus') {
    log(`[child ${t.toFixed(2)}] FOCUS`);
  }

  if (type === 'blur') {
    log(`[child ${t.toFixed(2)}] BLUR`);
  }
});
</script>

</body>
</html>
